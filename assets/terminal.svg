<svg width="780" height="270" viewBox="0 0 780 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sholtiee terminal profile card</title>
  <desc id="desc">A terminal styled card describing sholtiee as an Android and automation developer.</desc>
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="780" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.77 0 0 0 0 0.37 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .muted { fill: #7D8590; }
      .text { fill: #E6EDF3; }
      .green { fill: #22C55E; }
      .blue { fill: #60A5FA; }
      .purple { fill: #C084FC; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect x="1.5" y="1.5" width="777" height="267" rx="18" fill="#0D1117" stroke="url(#border)" stroke-width="3"/>
  <rect x="18" y="18" width="744" height="234" rx="14" fill="#010409" stroke="#30363D"/>

  <circle cx="42" cy="42" r="7" fill="#FF5F56"/>
  <circle cx="66" cy="42" r="7" fill="#FFBD2E"/>
  <circle cx="90" cy="42" r="7" fill="#27C93F"/>

  <text x="390" y="47" text-anchor="middle" class="mono muted" font-size="14">sholtiee@github: ~/profile</text>

  <g filter="url(#glow)">
    <text x="42" y="86" class="mono green" font-size="17">$ whoami</text>
    <text x="42" y="115" class="mono text" font-size="20" font-weight="700">Android developer / automation builder</text>

    <text x="42" y="153" class="mono green" font-size="17">$ stack --main</text>
    <text x="42" y="182" class="mono blue" font-size="18">Java</text>
    <text x="96" y="182" class="mono muted" font-size="18">+</text>
    <text x="118" y="182" class="mono blue" font-size="18">Android</text>
    <text x="202" y="182" class="mono muted" font-size="18">+</text>
    <text x="224" y="182" class="mono blue" font-size="18">Gradle</text>
    <text x="296" y="182" class="mono muted" font-size="18">+</text>
    <text x="318" y="182" class="mono blue" font-size="18">Git</text>
    <text x="364" y="182" class="mono muted" font-size="18">+</text>
    <text x="386" y="182" class="mono blue" font-size="18">practical tools</text>

    <text x="42" y="220" class="mono green" font-size="17">$ focus</text>
    <text x="118" y="220" class="mono purple" font-size="17">ship projects, clean up UX, automate boring stuff</text>
    <rect class="cursor" x="642" y="204" width="10" height="21" rx="2" fill="#22C55E"/>
  </g>
</svg>
